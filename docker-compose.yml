services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: clil-backend
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./backend:/app
      - ./tasks_v1.json:/tasks_v1.json:ro
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
    container_name: clil-frontend
    ports:
      - "3001:3000"
    env_file: .env
    environment:
      - VITE_API_URL=http://localhost:8000/api
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    container_name: clil-bot
    env_file: .env
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    profiles: ["bot"]

volumes:
  frontend_node_modules:
